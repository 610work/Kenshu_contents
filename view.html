<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>研修コンテンツ</title>
<style>
  :root{--ink:#1c1f26;--paper:#f6f5f1;--line:#d8d5cc;--accent:#8a3324;}
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;background:var(--paper);color:var(--ink);font-family:"Hiragino Sans","Yu Gothic UI",sans-serif;}
  body{display:flex;align-items:center;justify-content:center;padding:20px;}
  body.game-mode{padding:0;align-items:stretch;}
  .wrap{width:100%;max-width:1000px;}
  .wrap.game{
    max-width:100%;width:100vw;height:100vh;display:flex;flex-direction:column;
  }
  .game-topbar{
    display:flex;align-items:center;justify-content:space-between;gap:10px;
    padding:8px 14px;background:#111;flex-shrink:0;
  }
  .game-topbar h1{margin:0;font-size:13px;color:#ccc;}
  .game-topbar .time-remaining{margin:0;color:#ccc;font-size:12px;}
  .game-topbar .time-remaining.warning{color:#ff8a70;}
  .fullscreen-btn{
    background:var(--accent);color:#fff;border:none;padding:6px 14px;
    font-size:12px;cursor:pointer;flex-shrink:0;white-space:nowrap;
  }
  .fullscreen-btn:hover{background:#a83e2c;}
  .set-label{font-size:12px;color:var(--accent);margin:0 0 6px;font-weight:600;}
  .wrap.game .set-label{padding:6px 14px;margin:0;background:#000;color:#f0a08e;}
  h1{font-size:15px;margin:0 0 12px;color:#555;letter-spacing:.02em;white-space:pre-line;}
  .frame{position:relative;width:100%;aspect-ratio:16/9;background:#000;overflow:hidden;}
  .wrap.game .frame{flex:1;height:auto;aspect-ratio:auto;}
  .wrap.game #mainArea{flex:1;display:flex;flex-direction:column;min-height:0;}
  .frame iframe{width:100%;height:100%;border:0;}
  .time-remaining{
    margin-top:10px;font-size:13px;color:#555;font-weight:600;
    display:flex;align-items:center;gap:8px;
  }
  .time-remaining.warning{color:var(--accent);}
  .blocked{text-align:center;padding:60px 20px;}
  .blocked p{font-size:14px;color:#555;margin-bottom:20px;}
  .blocked a{display:inline-block;background:var(--ink);color:#fff;padding:11px 24px;text-decoration:none;font-size:14px;}
  .blocked a:hover{background:var(--accent);}

  .set-progress{font-size:12px;color:#666;margin-left:8px;font-weight:400;}
  .wrap.game .set-progress{color:#f0a08e;}
  /* 残り時間わずかの警告バー（画面上部に固定表示） */
  #lowTimeBar{
    position:fixed;top:0;left:0;right:0;z-index:9999;
    background:var(--accent);color:#fff;text-align:center;
    font-size:13px;font-weight:600;padding:8px 12px;
    transform:translateY(-100%);transition:transform .25s ease;
  }
  #lowTimeBar.show{transform:translateY(0);}
  .set-items-label{font-size:12px;color:#888;margin:20px 0 8px;}
  .set-items-row{display:flex;gap:12px;overflow-x:auto;padding-bottom:6px;}
  .set-item{
    flex:0 0 140px;cursor:pointer;border:2px solid transparent;background:#fff;
  }
  .set-item.active{border-color:var(--accent);}
  .set-item img{width:100%;aspect-ratio:16/9;object-fit:cover;display:block;background:#111;}
  .set-item-title{font-size:11px;padding:6px 8px;line-height:1.4;}

  /* ゲーム等の全画面コンテンツでは、切替エリアを暗い細いバーにして
     コンテンツ本体（iframe）に縦スペースを最大限ゆずる */
  .wrap.game .set-items-label{
    margin:0;padding:6px 14px 2px;background:#000;color:#999;
    flex-shrink:0;
  }
  .wrap.game .set-items-row{
    margin:0;padding:6px 14px 10px;background:#000;gap:8px;flex-shrink:0;align-items:stretch;
  }
  .wrap.game .set-item{
    flex:0 0 132px;display:flex;align-items:center;gap:8px;
    background:#1a1a1a;border-color:transparent;border-radius:4px;padding:5px;
  }
  .wrap.game .set-item.active{border-color:var(--accent);}
  .wrap.game .set-item img{width:48px;height:28px;flex-shrink:0;border-radius:2px;}
  .wrap.game .set-item-title{
    padding:0;font-size:11px;color:#ddd;line-height:1.3;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
  }
</style>
</head>
<body>
  <div id="lowTimeBar"></div>
  <div class="wrap" id="content"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyCN4OEFU_GgqklqE9pKVgpqvLRQPnAcIsU",
    authDomain: "cardocgame.firebaseapp.com",
    databaseURL: "https://cardocgame-default-rtdb.firebaseio.com",
    projectId: "cardocgame",
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  let countdownInterval = null;

  // XSS対策：DBから来た文字列は必ずこの関数を通してからHTMLに埋め込む
  function esc(s) {
    return String(s ?? "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;");
  }

  // ===== 視聴時間トラッキング =====
  const DB_URL = firebaseConfig.databaseURL;

  function getTrainee() {
    const name = localStorage.getItem("traineeName");
    if (!name) return null;
    return { name, key: localStorage.getItem("traineeKey") || "" };
  }
  // コンテンツのキー（タイトルの表記ゆれを吸収。gallery側の氏名正規化と同じ考え方）
  function titleKeyOf(title) {
    const k = String(title || "").normalize("NFKC").replace(/\s+/g, "")
      .toLowerCase().replace(/[.#$\[\]\/]/g, "_").slice(0, 180);
    return k || "untitled";
  }
  function loadLocalProgress(k) {
    try { return JSON.parse(localStorage.getItem("progressLocal") || "{}")[k] || null; }
    catch (e) { return null; }
  }
  function saveLocalProgress(k, rec) {
    try {
      const all = JSON.parse(localStorage.getItem("progressLocal") || "{}");
      all[k] = rec; localStorage.setItem("progressLocal", JSON.stringify(all));
    } catch (e) {}
  }

  let trackState = null;
  let trackTimer = null;

  function stopTracking() {
    if (trackTimer) { clearInterval(trackTimer); trackTimer = null; }
    flushProgress(false);
    trackState = null;
  }

  function startTracking(item) {
    stopTracking(); // 前のコンテンツ分を保存して停止
    const trainee = getTrainee();
    if (!trainee || !trainee.key) return; // 名前未設定なら記録しない
    const cKey = titleKeyOf(item.title);
    const prev = loadLocalProgress(trainee.key + "/" + cKey) || {};
    trackState = {
      path: "progress/" + trainee.key + "/" + cKey,
      storeKey: trainee.key + "/" + cKey,
      name: trainee.name,
      title: (item.title || "").replace(/\n/g, " "),
      type: item.type,
      watched: prev.watched || 0,           // 端末内の累計を引き継ぐ
      duration: prev.duration || null,
      firstViewedAt: prev.firstViewedAt || Date.now(),
      ticks: 0,
    };
    trackTimer = setInterval(trackTick, 5000);
  }

  function trackTick() {
    if (!trackState) return;
    let active = false;
    if (trackState.type === "mp4") {
      const v = document.querySelector("#content video");
      if (v) {
        if (!v.paused && !v.ended && !v.seeking) active = true;
        if (v.duration && isFinite(v.duration)) trackState.duration = Math.round(v.duration);
      }
    } else {
      // ゲーム等：タブが見えている間はプレイ中とみなす
      if (document.visibilityState === "visible") active = true;
    }
    if (active) trackState.watched += 5;
    trackState.ticks++;
    saveLocalProgress(trackState.storeKey, {
      watched: trackState.watched, duration: trackState.duration, firstViewedAt: trackState.firstViewedAt,
    });
    if (trackState.ticks % 3 === 0) flushProgress(false); // 15秒ごとにDBへ
  }

  function flushProgress(useKeepalive) {
    if (!trackState) return;
    const s = trackState;
    const payload = {
      name: s.name, title: s.title, type: s.type,
      watchedSeconds: Math.round(s.watched),
      durationSeconds: s.duration || null,
      firstViewedAt: s.firstViewedAt, lastViewedAt: Date.now(),
    };
    if (useKeepalive) {
      // ページ離脱時でも届くように keepalive 付き fetch でPATCH
      try {
        fetch(DB_URL + "/" + s.path + ".json", {
          method: "PATCH", body: JSON.stringify(payload), keepalive: true,
        }).catch(() => {});
      } catch (e) {}
    } else {
      db.ref(s.path).update(payload).catch(() => {});
    }
  }

  // 離脱・タブ非表示時に取りこぼさないよう保存
  window.addEventListener("pagehide", () => flushProgress(true));
  document.addEventListener("visibilitychange", () => {
    if (document.visibilityState === "hidden") flushProgress(true);
  });

  function block(message) {
    if (countdownInterval) clearInterval(countdownInterval);
    stopTracking(); // 視聴終了時に記録を確定
    const bar = document.getElementById("lowTimeBar");
    if (bar) bar.classList.remove("show");
    document.body.classList.remove("game-mode");
    document.getElementById("content").classList.remove("game");
    document.getElementById("content").innerHTML = `
      <div class="blocked">
        <p>${esc(message)}</p>
        <a href="gallery.html">コンテンツ一覧へ戻る</a>
      </div>
    `;
  }

  function formatRemaining(ms) {
    const totalSec = Math.max(0, Math.floor(ms / 1000));
    const m = Math.floor(totalSec / 60);
    const s = totalSec % 60;
    return `残り ${m}分${String(s).padStart(2, "0")}秒`;
  }

  function stopPlayback() {
    const videoEl = document.querySelector("#content video");
    if (videoEl) videoEl.pause();
  }

  function getSession() {
    const raw = localStorage.getItem("viewAccess");
    if (!raw) return null;
    try { return JSON.parse(raw); } catch { return null; }
  }

  function saveSession(session) {
    localStorage.setItem("viewAccess", JSON.stringify(session));
  }

  // 動画の再生位置を記憶（セット内で切り替えても続きから見られる）
  function rememberPosition() {
    const videoEl = document.querySelector("#content video");
    if (!videoEl) return;
    const session = getSession();
    if (!session) return;
    session.positions = session.positions || {};
    session.positions[session.currentIndex] = videoEl.currentTime;
    saveSession(session);
  }

  function renderItemsRow(session) {
    if (!session.items || session.items.length <= 1) return "";
    const rows = session.items.map((it, i) => `
      <div class="set-item ${i === session.currentIndex ? "active" : ""}" onclick="switchItem(${i})">
        <img src="${esc(it.thumbnail || "")}" onerror="this.style.opacity=0.2">
        <div class="set-item-title">${esc((it.title || "").replace(/\n/g, " "))}</div>
      </div>
    `).join("");
    return `
      <div class="set-items-label">このセットの内容（クリックで切り替え）</div>
      <div class="set-items-row">${rows}</div>
    `;
  }

  function renderMp4Into(mainArea, item, session) {
    const savedPos = (session.positions || {})[session.currentIndex] || 0;
    mainArea.innerHTML = `
      <h1>${esc(item.title || "研修動画")}</h1>
      <div class="frame">
        <video
          src="${esc(item.videoUrl)}"
          controls
          controlsList="nodownload noremoteplayback"
          disablePictureInPicture
          autoplay
          oncontextmenu="return false;"
          style="width:100%;height:100%;background:#000;"
        ></video>
      </div>
      <div class="time-remaining" id="timeRemaining"></div>
    `;

    const videoEl = mainArea.querySelector("video");
    if (savedPos > 1) {
      videoEl.addEventListener("loadedmetadata", () => {
        videoEl.currentTime = savedPos;
      }, { once: true });
    }
    // 再生位置を定期的に保存
    videoEl.addEventListener("timeupdate", () => {
      const session = getSession();
      if (!session) return;
      session.positions = session.positions || {};
      session.positions[session.currentIndex] = videoEl.currentTime;
      saveSession(session);
    });
  }

  function renderGameInto(mainArea, item, wrap) {
    wrap.classList.add("game");
    document.body.classList.add("game-mode");
    mainArea.innerHTML = `
      <div class="game-topbar">
        <h1>${esc(item.title || "研修ゲーム")}</h1>
        <div class="time-remaining" id="timeRemaining"></div>
        <button class="fullscreen-btn" id="fullscreenBtn" type="button">全画面表示</button>
      </div>
      <div class="frame">
        <iframe
          id="gameIframe"
          src="${esc(item.gameUrl)}"
          allow="fullscreen"
          allowfullscreen
          sandbox="allow-scripts allow-same-origin allow-pointer-lock allow-forms"
          referrerpolicy="no-referrer"
        ></iframe>
      </div>
    `;

    const btn = document.getElementById("fullscreenBtn");
    if (btn) {
      btn.addEventListener("click", () => {
        const frameEl = document.querySelector(".wrap.game .frame");
        if (frameEl && frameEl.requestFullscreen) {
          frameEl.requestFullscreen();
        } else if (frameEl && frameEl.webkitRequestFullscreen) {
          frameEl.webkitRequestFullscreen();
        }
      });
    }
  }

  function renderCurrentItem() {
    const session = getSession();
    if (!session) return;

    stopPlayback();

    const item = session.items[session.currentIndex];
    const wrap = document.getElementById("content");
    wrap.classList.remove("game");
    document.body.classList.remove("game-mode");

    const setLabel = session.items.length > 1
      ? `<div class="set-label">セット: ${esc((session.title || "").replace(/\n/g, " "))}<span class="set-progress">（${session.currentIndex + 1} / ${session.items.length} 本目）</span></div>`
      : "";

    wrap.innerHTML = `${setLabel}<div id="mainArea"></div>`;
    const mainArea = document.getElementById("mainArea");

    if (item.type === "mp4" && item.videoUrl) {
      renderMp4Into(mainArea, item, session);
      startTracking(item);
    } else if (item.type === "game" && item.gameUrl) {
      renderGameInto(mainArea, item, wrap);
      startTracking(item);
    } else {
      stopTracking();
      mainArea.innerHTML = `<p style="font-size:13px;color:#888;">このコンテンツは表示できません。管理者にお問い合わせください。</p>`;
    }

    wrap.insertAdjacentHTML("beforeend", renderItemsRow(session));
  }

  function switchItem(i) {
    rememberPosition();
    const session = getSession();
    if (!session) return;
    session.currentIndex = i;
    saveSession(session);
    renderCurrentItem();
  }

  function startCountdown(viewExpiresAt) {
    if (countdownInterval) clearInterval(countdownInterval);

    const tick = () => {
      const remaining = viewExpiresAt - Date.now();
      const el = document.getElementById("timeRemaining");

      if (remaining <= 0) {
        clearInterval(countdownInterval);
        stopPlayback();
        localStorage.removeItem("viewAccess");
        block("視聴可能時間が終了しました。もう一度コードを入力してください。");
        return;
      }

      const low = remaining < 5 * 60 * 1000;
      if (el) {
        el.textContent = formatRemaining(remaining);
        el.classList.toggle("warning", low);
      }
      // 残り5分を切ったら画面上部に警告バーを固定表示（見落とし防止）
      const bar = document.getElementById("lowTimeBar");
      if (bar) {
        bar.textContent = `⏳ まもなく終了します（${formatRemaining(remaining)}）`;
        bar.classList.toggle("show", low);
      }
    };

    tick();
    countdownInterval = setInterval(tick, 1000);
  }

  function render() {
    const session = getSession();
    if (!session) {
      block("視聴・プレイ情報が確認できませんでした。コードを入力し直してください。");
      return;
    }

    if (!session.items || !session.items.length) {
      block("コンテンツ情報が不正です。コードを入力し直してください。");
      return;
    }

    if (session.viewExpiresAt && session.viewExpiresAt <= Date.now()) {
      localStorage.removeItem("viewAccess");
      block("視聴可能時間が終了しました。もう一度コードを入力してください。");
      return;
    }

    renderCurrentItem();

    if (session.viewExpiresAt) {
      startCountdown(session.viewExpiresAt);
    }
  }

  // タブ復帰・再読み込み時も、時間切れかどうかを都度チェックする
  // （ページ移動そのものではアクセスを破棄しない＝時間内なら戻ってきても視聴継続できる）
  window.addEventListener("pageshow", (event) => {
    if (event.persisted) {
      render();
    }
  });

  render();
</script>
</body>
</html>
