<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>研修コンテンツ</title>
<style>
  :root{--ink:#1c1f26;--paper:#f6f5f1;--line:#d8d5cc;--accent:#8a3324;}
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;background:var(--paper);color:var(--ink);font-family:"Hiragino Sans","Yu Gothic UI",sans-serif;}
  body{display:flex;align-items:center;justify-content:center;padding:20px;}
  .wrap{width:100%;max-width:1000px;}
  .wrap.game{max-width:1100px;}
  .set-label{font-size:12px;color:var(--accent);margin:0 0 6px;font-weight:600;}
  h1{font-size:15px;margin:0 0 12px;color:#555;letter-spacing:.02em;white-space:pre-line;}
  .frame{position:relative;width:100%;aspect-ratio:16/9;background:#000;overflow:hidden;}
  .wrap.game .frame{height:70vh;aspect-ratio:auto;}
  .frame iframe{width:100%;height:100%;border:0;}
  #yt-player-target{width:100%;height:100%;pointer-events:none;}
  .controls{
    display:flex;align-items:center;gap:12px;
    background:#111;padding:10px 14px;
  }
  .controls button{
    background:none;border:none;color:#fff;cursor:pointer;padding:4px;
    font-size:16px;line-height:1;display:flex;align-items:center;
  }
  .controls button:hover{color:var(--accent);}
  .seek{flex:1;display:flex;align-items:center;gap:10px;}
  .seek input[type=range]{flex:1;accent-color:var(--accent);}
  .time{color:#bbb;font-size:12px;font-family:monospace;min-width:88px;text-align:center;}
  .time-remaining{
    margin-top:10px;font-size:13px;color:#555;font-weight:600;
    display:flex;align-items:center;gap:8px;
  }
  .time-remaining.warning{color:var(--accent);}
  .blocked{text-align:center;padding:60px 20px;}
  .blocked p{font-size:14px;color:#555;margin-bottom:20px;}
  .blocked a{display:inline-block;background:var(--ink);color:#fff;padding:11px 24px;text-decoration:none;font-size:14px;}
  .blocked a:hover{background:var(--accent);}

  .set-items-label{font-size:12px;color:#888;margin:20px 0 8px;}
  .set-items-row{display:flex;gap:12px;overflow-x:auto;padding-bottom:6px;}
  .set-item{
    flex:0 0 140px;cursor:pointer;border:2px solid transparent;background:#fff;
  }
  .set-item.active{border-color:var(--accent);}
  .set-item img{width:100%;aspect-ratio:16/9;object-fit:cover;display:block;background:#111;}
  .set-item-title{font-size:11px;padding:6px 8px;white-space:pre-line;line-height:1.4;}
</style>
</head>
<body>
  <div class="wrap" id="content"></div>

<script>
  let ytPlayer = null;
  let ytApiReady = false;
  let pendingItem = null;
  let countdownInterval = null;

  function block(message) {
    if (countdownInterval) clearInterval(countdownInterval);
    document.getElementById("content").innerHTML = `
      <div class="blocked">
        <p>${message}</p>
        <a href="gallery.html">コンテンツ一覧へ戻る</a>
      </div>
    `;
  }

  function formatTime(sec) {
    sec = Math.max(0, Math.floor(sec || 0));
    const m = Math.floor(sec / 60);
    const s = sec % 60;
    return `${m}:${String(s).padStart(2, "0")}`;
  }

  function formatRemaining(ms) {
    const totalSec = Math.max(0, Math.floor(ms / 1000));
    const m = Math.floor(totalSec / 60);
    const s = totalSec % 60;
    return `残り ${m}分${String(s).padStart(2, "0")}秒`;
  }

  function stopPlayback() {
    if (ytPlayer && typeof ytPlayer.pauseVideo === "function") {
      try { ytPlayer.pauseVideo(); } catch (e) {}
    }
    ytPlayer = null;
    const videoEl = document.querySelector("#content video");
    if (videoEl) videoEl.pause();
  }

  function getSession() {
    const raw = sessionStorage.getItem("viewAccess");
    if (!raw) return null;
    try { return JSON.parse(raw); } catch { return null; }
  }

  function renderItemsRow(session) {
    if (!session.items || session.items.length <= 1) return "";
    const rows = session.items.map((it, i) => `
      <div class="set-item ${i === session.currentIndex ? "active" : ""}" onclick="switchItem(${i})">
        <img src="${it.thumbnail || ''}" onerror="this.style.opacity=0.2">
        <div class="set-item-title">${(it.title || "").replace(/\n/g, " ")}</div>
      </div>
    `).join("");
    return `
      <div class="set-items-label">このセットの内容（クリックで切り替え）</div>
      <div class="set-items-row">${rows}</div>
    `;
  }

  function renderYoutubeInto(mainArea, item) {
    mainArea.innerHTML = `
      <h1>${item.title || "研修動画"}</h1>
      <div class="frame">
        <div id="yt-player-target"></div>
      </div>
      <div class="controls">
        <button id="playPauseBtn" aria-label="再生・一時停止">▶</button>
        <div class="seek">
          <input type="range" id="seekBar" value="0" min="0" max="100" step="0.1">
        </div>
        <div class="time" id="timeLabel">0:00 / 0:00</div>
        <button id="muteBtn" aria-label="ミュート">🔊</button>
      </div>
      <div class="time-remaining" id="timeRemaining"></div>
    `;

    if (ytApiReady) {
      createYtPlayer(item.videoId);
    } else {
      pendingItem = item;
    }
  }

  function createYtPlayer(videoId) {
    ytPlayer = new YT.Player("yt-player-target", {
      videoId: videoId,
      playerVars: {
        autoplay: 1,
        controls: 0,
        disablekb: 1,
        fs: 0,
        modestbranding: 1,
        rel: 0,
        iv_load_policy: 3,
        playsinline: 1,
      },
      events: {
        onReady: onPlayerReady,
        onStateChange: onPlayerStateChange,
      },
    });
  }

  function onPlayerReady() {
    const target = document.getElementById("yt-player-target");
    if (target) target.style.pointerEvents = "none";
    startProgressLoop();
  }

  function onPlayerStateChange(e) {
    const btn = document.getElementById("playPauseBtn");
    if (!btn) return;
    btn.textContent = e.data === YT.PlayerState.PLAYING ? "❚❚" : "▶";
  }

  function startProgressLoop() {
    setInterval(() => {
      if (!ytPlayer || typeof ytPlayer.getCurrentTime !== "function") return;
      let cur, dur;
      try {
        cur = ytPlayer.getCurrentTime();
        dur = ytPlayer.getDuration();
      } catch (e) { return; }
      const seekBar = document.getElementById("seekBar");
      const timeLabel = document.getElementById("timeLabel");
      if (seekBar && dur > 0 && !seekBar.dataset.dragging) {
        seekBar.max = dur;
        seekBar.value = cur;
      }
      if (timeLabel) {
        timeLabel.textContent = `${formatTime(cur)} / ${formatTime(dur)}`;
      }
    }, 400);
  }

  document.addEventListener("click", (e) => {
    if (e.target.id === "playPauseBtn") {
      if (!ytPlayer) return;
      const state = ytPlayer.getPlayerState();
      if (state === YT.PlayerState.PLAYING) ytPlayer.pauseVideo();
      else ytPlayer.playVideo();
    }
    if (e.target.id === "muteBtn") {
      if (!ytPlayer) return;
      if (ytPlayer.isMuted()) {
        ytPlayer.unMute();
        e.target.textContent = "🔊";
      } else {
        ytPlayer.mute();
        e.target.textContent = "🔇";
      }
    }
  });

  document.addEventListener("input", (e) => {
    if (e.target.id === "seekBar") {
      e.target.dataset.dragging = "1";
    }
  });
  document.addEventListener("change", (e) => {
    if (e.target.id === "seekBar" && ytPlayer) {
      ytPlayer.seekTo(parseFloat(e.target.value), true);
      delete e.target.dataset.dragging;
    }
  });

  window.onYouTubeIframeAPIReady = function () {
    ytApiReady = true;
    if (pendingItem) {
      createYtPlayer(pendingItem.videoId);
      pendingItem = null;
    }
  };

  function renderMp4Into(mainArea, item) {
    mainArea.innerHTML = `
      <h1>${item.title || "研修動画"}</h1>
      <div class="frame">
        <video
          src="${item.videoUrl}"
          controls
          controlsList="nodownload noremoteplayback"
          disablePictureInPicture
          autoplay
          oncontextmenu="return false;"
          style="width:100%;height:100%;background:#000;"
        ></video>
      </div>
      <div class="time-remaining" id="timeRemaining"></div>
    `;
  }

  function renderGameInto(mainArea, item, wrap) {
    wrap.classList.add("game");
    mainArea.innerHTML = `
      <h1>${item.title || "研修ゲーム"}</h1>
      <div class="frame">
        <iframe src="${item.gameUrl}" allow="fullscreen" allowfullscreen></iframe>
      </div>
      <div class="time-remaining" id="timeRemaining"></div>
    `;
  }

  function renderCurrentItem() {
    const session = getSession();
    if (!session) return;

    stopPlayback();

    const item = session.items[session.currentIndex];
    const wrap = document.getElementById("content");
    wrap.classList.remove("game");

    const setLabel = session.items.length > 1
      ? `<div class="set-label">セット: ${(session.title || "").replace(/\n/g, " ")}</div>`
      : "";

    wrap.innerHTML = `${setLabel}<div id="mainArea"></div>`;
    const mainArea = document.getElementById("mainArea");

    if (item.type === "youtube" && item.videoId) {
      renderYoutubeInto(mainArea, item);
    } else if (item.type === "mp4" && item.videoUrl) {
      renderMp4Into(mainArea, item);
    } else if (item.type === "game" && item.gameUrl) {
      renderGameInto(mainArea, item, wrap);
    } else {
      mainArea.innerHTML = `<p style="font-size:13px;color:#888;">このコンテンツは表示できません。</p>`;
    }

    wrap.insertAdjacentHTML("beforeend", renderItemsRow(session));
  }

  function switchItem(i) {
    const session = getSession();
    if (!session) return;
    session.currentIndex = i;
    sessionStorage.setItem("viewAccess", JSON.stringify(session));
    renderCurrentItem();
  }

  function startCountdown(viewExpiresAt) {
    if (countdownInterval) clearInterval(countdownInterval);

    const tick = () => {
      const remaining = viewExpiresAt - Date.now();
      const el = document.getElementById("timeRemaining");

      if (remaining <= 0) {
        clearInterval(countdownInterval);
        stopPlayback();
        sessionStorage.removeItem("viewAccess");
        block("視聴可能時間が終了しました。もう一度コードを入力してください。");
        return;
      }

      if (el) {
        el.textContent = formatRemaining(remaining);
        el.classList.toggle("warning", remaining < 5 * 60 * 1000);
      }
    };

    tick();
    countdownInterval = setInterval(tick, 1000);
  }

  function render() {
    const session = getSession();
    if (!session) {
      block("視聴・プレイ情報が確認できませんでした。コードを入力し直してください。");
      return;
    }

    if (!session.items || !session.items.length) {
      block("コンテンツ情報が不正です。コードを入力し直してください。");
      return;
    }

    if (session.viewExpiresAt && session.viewExpiresAt <= Date.now()) {
      sessionStorage.removeItem("viewAccess");
      block("視聴可能時間が終了しました。もう一度コードを入力してください。");
      return;
    }

    renderCurrentItem();

    if (session.viewExpiresAt) {
      startCountdown(session.viewExpiresAt);
    }
  }

  // タブ復帰・再読み込み時も、時間切れかどうかを都度チェックする
  // （ページ移動そのものではアクセスを破棄しない＝時間内なら戻ってきても視聴継続できる）
  window.addEventListener("pageshow", (event) => {
    if (event.persisted) {
      render();
    }
  });

  const ytApiTag = document.createElement("script");
  ytApiTag.src = "https://www.youtube.com/iframe_api";
  document.head.appendChild(ytApiTag);

  render();
</script>
</body>
</html>
