<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>研修コンテンツ一覧</title>
<style>
  :root{
    --ink:#1c1f26; --paper:#f6f5f1; --line:#d8d5cc; --accent:#8a3324;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;min-height:100vh;background:var(--paper);color:var(--ink);
    font-family:"Hiragino Sans","Yu Gothic UI",sans-serif;padding:40px 20px 80px;
  }
  .wrap{max-width:920px;margin:0 auto;}
  header{margin-bottom:32px;border-bottom:2px solid var(--ink);padding-bottom:16px;}
  header h1{font-size:22px;margin:0 0 6px;}
  header p{margin:0;font-size:13px;color:#666;}
  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(220px, 1fr));
    gap:20px;
  }
  .card{
    background:#fff;border:1px solid var(--line);cursor:pointer;
    transition:transform .15s ease, box-shadow .15s ease;
    text-decoration:none;color:inherit;display:block;
  }
  .card:hover{transform:translateY(-3px);box-shadow:0 6px 16px rgba(0,0,0,0.08);}
  .card:focus-visible{outline:3px solid var(--accent);outline-offset:2px;}
  .thumb{
    width:100%;aspect-ratio:16/9;background:#111;overflow:hidden;position:relative;
  }
  .thumb img{width:100%;height:100%;object-fit:cover;display:block;}
  .type-tag{
    position:absolute;top:8px;left:8px;
    background:rgba(0,0,0,0.65);color:#fff;font-size:11px;
    padding:2px 8px;border-radius:10px;letter-spacing:.02em;
  }
  .card .body{padding:12px 14px;}
  .card .title{font-size:14px;font-weight:600;margin:0;white-space:pre-line;}
  .empty{color:#999;font-size:14px;text-align:center;padding:60px 0;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>研修コンテンツ一覧</h1>
    <p>視聴・プレイしたいコンテンツを選んでください。専用コードが必要です（担当者に発行を依頼してください）。</p>
  </header>
  <div class="grid" id="grid"></div>
  <div class="empty" id="emptyMsg" style="display:none;">現在、公開中のコンテンツはありません</div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script>
  // admin.html と同じFirebase設定に置き換えてください
  const firebaseConfig = {
    apiKey: "AIzaSyCN4OEFU_GgqklqE9pKVgpqvLRQPnAcIsU",
    authDomain: "cardocgame.firebaseapp.com",
    databaseURL: "https://cardocgame-default-rtdb.firebaseio.com",
    projectId: "cardocgame",
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  db.ref("contents").once("value", (snap) => {
    const data = snap.val() || {};
    const grid = document.getElementById("grid");
    const entries = Object.entries(data);

    document.getElementById("emptyMsg").style.display = entries.length ? "none" : "block";

    entries.forEach(([id, c]) => {
      const a = document.createElement("a");
      a.className = "card";
      a.href = `login.html?content=${id}`;
      a.innerHTML = `
        <div class="thumb">
          <span class="type-tag">${c.type === "game" ? "ゲーム" : "動画"}</span>
          <img src="${c.thumbnail || ''}" alt="${c.title}" onerror="this.style.opacity=0.15">
        </div>
        <div class="body">
          <p class="title">${c.title}</p>
        </div>
      `;
      grid.appendChild(a);
    });
  });
</script>
</body>
</html>
