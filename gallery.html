<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>研修コンテンツ一覧</title>
<style>
  :root{
    --ink:#1c1f26; --paper:#f6f5f1; --line:#d8d5cc; --accent:#8a3324;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;min-height:100vh;background:var(--paper);color:var(--ink);
    font-family:"Hiragino Sans","Yu Gothic UI",sans-serif;padding:40px 20px 80px;
  }
  .wrap{max-width:920px;margin:0 auto;}
  header{margin-bottom:32px;border-bottom:2px solid var(--ink);padding-bottom:16px;}
  header h1{font-size:22px;margin:0 0 6px;}
  header p{margin:0;font-size:13px;color:#666;}
  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(220px, 1fr));
    gap:20px;
  }
  .card{
    background:#fff;border:1px solid var(--line);cursor:pointer;
    transition:transform .15s ease, box-shadow .15s ease;
    text-decoration:none;color:inherit;display:block;
  }
  .card:hover{transform:translateY(-3px);box-shadow:0 6px 16px rgba(0,0,0,0.08);}
  .card:focus-visible{outline:3px solid var(--accent);outline-offset:2px;}
  .thumb{
    width:100%;aspect-ratio:16/9;background:#111;overflow:hidden;position:relative;
  }
  .thumb img{width:100%;height:100%;object-fit:cover;display:block;}
  .collage{display:grid;width:100%;height:100%;gap:2px;background:#000;}
  .collage img{width:100%;height:100%;object-fit:cover;display:block;}
  .collage-1{grid-template-columns:1fr;grid-template-rows:1fr;}
  .collage-2{grid-template-columns:1fr 1fr;grid-template-rows:1fr;}
  .collage-3{grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;}
  .collage-3 img:first-child{grid-column:1 / 3;}
  .collage-4{grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;}
  .type-tag{
    position:absolute;top:8px;left:8px;
    background:rgba(0,0,0,0.65);color:#fff;font-size:11px;
    padding:2px 8px;border-radius:10px;letter-spacing:.02em;
  }
  .viewed-tag{
    position:absolute;top:8px;right:8px;
    background:rgba(47,107,44,0.92);color:#fff;font-size:11px;font-weight:600;
    padding:2px 8px;border-radius:10px;letter-spacing:.02em;
  }
  .tab-count{
    display:inline-block;min-width:18px;padding:0 5px;margin-left:2px;
    background:rgba(0,0,0,0.12);border-radius:999px;font-size:11px;line-height:16px;
    text-align:center;vertical-align:middle;
  }
  .tab.active .tab-count{background:rgba(255,255,255,0.28);}
  .card .body{padding:12px 14px;}
  .card .title{font-size:14px;font-weight:600;margin:0;white-space:pre-line;}
  .empty{color:#999;font-size:14px;text-align:center;padding:60px 0;}
  .loading{color:#999;font-size:13px;text-align:center;padding:50px 0;display:flex;align-items:center;justify-content:center;gap:10px;}
  .spinner{
    width:18px;height:18px;border:2.5px solid var(--line);border-top-color:var(--accent);
    border-radius:50%;display:inline-block;animation:spin .8s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}

  .tabs{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap;}
  .tab{
    background:#fff;border:1px solid var(--line);color:#666;
    font-size:13px;padding:8px 18px;border-radius:999px;cursor:pointer;
    font-family:inherit;transition:background .15s ease, color .15s ease, border-color .15s ease;
  }
  .tab:hover{border-color:var(--accent);color:var(--accent);}
  .tab.active{background:var(--ink);color:#fff;border-color:var(--ink);}

  @media (max-width: 480px){
    body{padding:24px 14px 60px;}
    header h1{font-size:19px;}
    .grid{grid-template-columns:repeat(auto-fill, minmax(150px, 1fr));gap:14px;}
    .card .body{padding:10px 12px;}
    .card .title{font-size:13px;}
    .tab{font-size:12px;padding:7px 14px;}
  }

  /* 研修生の名前入力ゲート */
  #nameGate{
    position:fixed;inset:0;z-index:1000;background:var(--paper);
    display:flex;align-items:center;justify-content:center;padding:20px;
  }
  #nameGate .box{width:100%;max-width:400px;background:#fff;border:1px solid var(--line);padding:28px;}
  #nameGate h2{margin:0 0 6px;font-size:18px;}
  #nameGate p{margin:0 0 18px;font-size:13px;color:#777;line-height:1.7;}
  #nameGate input{
    width:100%;font-size:16px;padding:13px 12px;border:1px solid var(--line);margin-bottom:14px;
    font-family:inherit;
  }
  #nameGate input:focus{outline:2px solid var(--accent);outline-offset:1px;}
  #nameGate button{width:100%;background:var(--ink);color:#fff;border:none;padding:13px;font-size:14px;cursor:pointer;}
  #nameGate button:hover{background:var(--accent);}
  #nameGate .err{color:var(--accent);font-size:12px;margin:-8px 0 12px;display:none;}
  #nameGate .err.show{display:block;}
  /* ヘッダーの研修生表示 */
  .trainee-badge{
    font-size:12px;color:#555;margin-top:8px;
  }
  .trainee-badge b{color:var(--ink);}
  .trainee-badge button{
    background:none;border:none;color:var(--accent);font-size:12px;cursor:pointer;
    text-decoration:underline;padding:0 0 0 6px;font-family:inherit;
  }
  /* 視聴中コンテンツへの再入場バナー */
  #resumeBanner{margin-bottom:22px;}
  #resumeBanner a{
    display:block;background:#f0e2dc;border:1px solid var(--accent);color:var(--accent);
    padding:13px 16px;text-decoration:none;font-size:14px;font-weight:600;border-radius:4px;
  }
  #resumeBanner a span{font-weight:normal;font-size:12px;}
  #resumeBanner a:hover{background:var(--accent);color:#fff;}
</style>
</head>
<body>
<div id="nameGate">
  <div class="box">
    <h2>お名前を入力してください</h2>
    <p>研修の進捗を記録します。<b>フルネーム</b>で入力してください（毎回同じ名前でお願いします）。</p>
    <form id="nameForm">
      <input type="text" id="nameInput" placeholder="例：山田 太郎" autocomplete="name" maxlength="40" required>
      <div class="err" id="nameErr">お名前を入力してください。</div>
      <button type="submit">研修をはじめる</button>
    </form>
  </div>
</div>

<div class="wrap">
  <header>
    <h1>研修コンテンツ一覧</h1>
    <p>視聴・プレイしたいコンテンツを選んでください。専用コードが必要です（担当者に発行を依頼してください）。</p>
    <div class="trainee-badge" id="traineeBadge"></div>
  </header>
  <div id="resumeBanner" style="display:none;"></div>
  <div class="tabs" id="tabs">
    <button class="tab active" data-filter="all">すべて</button>
    <button class="tab" data-filter="set">セット</button>
    <button class="tab" data-filter="video">動画</button>
    <button class="tab" data-filter="game">ゲーム</button>
  </div>
  <div class="grid" id="grid"></div>
  <div class="loading" id="loadingMsg"><span class="spinner"></span>読み込み中...</div>
  <div class="empty" id="emptyMsg" style="display:none;">現在、公開中のコンテンツはありません</div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script>
  // admin.html と同じFirebase設定に置き換えてください
  const firebaseConfig = {
    apiKey: "AIzaSyCN4OEFU_GgqklqE9pKVgpqvLRQPnAcIsU",
    authDomain: "cardocgame.firebaseapp.com",
    databaseURL: "https://cardocgame-default-rtdb.firebaseio.com",
    projectId: "cardocgame",
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  // XSS対策：DBから来た文字列は必ずこの関数を通してからHTMLに埋め込む
  function esc(s) {
    return String(s ?? "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;");
  }

  // ===== 研修生の名前ゲート =====
  // 表記ゆれ（前後空白・中間空白・全角半角・大文字小文字）を吸収して
  // 「同一人物キー」を作る。これでキーが一致すれば自動的に同じ人として集計される。
  // Firebaseのキーに使えない文字（. # $ [ ] /）は _ に置換する。
  function traineeKeyOf(name) {
    return String(name || "")
      .normalize("NFKC")          // 全角英数記号→半角、半角カナ→全角カナ 等
      .replace(/\s+/g, "")        // 空白（全角含む）を全部除去
      .toLowerCase()              // 英字の大文字小文字を無視
      .replace(/[.#$\[\]\/]/g, "_");
  }

  function getTrainee() {
    const name = localStorage.getItem("traineeName");
    if (!name) return null;
    return { name, key: localStorage.getItem("traineeKey") || traineeKeyOf(name) };
  }

  function setTrainee(rawName) {
    const name = rawName.trim().replace(/\s+/g, " "); // 表示用は連続空白を1つに
    localStorage.setItem("traineeName", name);
    localStorage.setItem("traineeKey", traineeKeyOf(name));
  }

  function renderTraineeBadge() {
    const t = getTrainee();
    const badge = document.getElementById("traineeBadge");
    if (!badge) return;
    if (t) {
      badge.innerHTML = `研修生：<b>${esc(t.name)}</b><button onclick="changeTrainee()">名前を変更</button>`;
    } else {
      badge.innerHTML = "";
    }
  }

  window.changeTrainee = function () {
    document.getElementById("nameInput").value = (getTrainee() || {}).name || "";
    document.getElementById("nameGate").style.display = "flex";
    document.getElementById("nameInput").focus();
  };

  function initNameGate() {
    const gate = document.getElementById("nameGate");
    const input = document.getElementById("nameInput");
    const err = document.getElementById("nameErr");
    const t = getTrainee();
    if (t) {
      gate.style.display = "none";
    } else {
      gate.style.display = "flex";
      setTimeout(() => input.focus(), 100);
    }
    document.getElementById("nameForm").addEventListener("submit", (e) => {
      e.preventDefault();
      const val = input.value.trim();
      if (!val) { err.classList.add("show"); return; }
      err.classList.remove("show");
      setTrainee(val);
      gate.style.display = "none";
      renderTraineeBadge();
    });
    renderTraineeBadge();
  }

  function collageHtml(thumbnails) {
    const imgs = (thumbnails || []).filter(Boolean).slice(0, 4);
    if (imgs.length === 0) {
      return `<img src="" onerror="this.style.opacity=0.15">`;
    }
    const cls = `collage-${imgs.length}`;
    return `<div class="collage ${cls}">${imgs.map(u => `<img src="${esc(u)}" onerror="this.style.opacity=0.15">`).join("")}</div>`;
  }

  let allItems = [];
  let currentFilter = "all";

  // この端末で視聴済みの対象キー一覧
  function getViewedTargets() {
    try { return JSON.parse(localStorage.getItem("viewedTargets") || "[]"); }
    catch (e) { return []; }
  }

  function viewedBadgeHtml(item) {
    return getViewedTargets().includes(item.targetKey)
      ? `<span class="viewed-tag">✓ 視聴済み</span>` : "";
  }

  function cardHtml(item) {
    if (item.category === "set") {
      const s = item.data;
      return `
        <div class="thumb">
          <span class="type-tag">セット（${(s.contentIds || []).length}件）</span>
          ${viewedBadgeHtml(item)}
          ${collageHtml(s.thumbnails && s.thumbnails.length ? s.thumbnails : [s.thumbnail])}
        </div>
        <div class="body">
          <p class="title">${esc(s.title)}</p>
        </div>
      `;
    }
    const c = item.data;
    return `
      <div class="thumb">
        <span class="type-tag">${c.type === "game" ? "ゲーム" : "動画"}</span>
        ${viewedBadgeHtml(item)}
        <img src="${esc(c.thumbnail || '')}" alt="${esc(c.title)}" onerror="this.style.opacity=0.15">
      </div>
      <div class="body">
        <p class="title">${esc(c.title)}</p>
      </div>
    `;
  }

  // タブに件数バッジを付ける（例：動画 5）
  function updateTabCounts() {
    const counts = {
      all: allItems.length,
      set: allItems.filter(i => i.category === "set").length,
      video: allItems.filter(i => i.category === "video").length,
      game: allItems.filter(i => i.category === "game").length,
    };
    document.querySelectorAll(".tab").forEach(tab => {
      const f = tab.dataset.filter;
      const base = tab.dataset.label || tab.textContent.trim();
      tab.dataset.label = base;
      tab.innerHTML = `${esc(base)} <span class="tab-count">${counts[f] ?? 0}</span>`;
    });
  }

  function renderGrid() {
    const grid = document.getElementById("grid");
    grid.innerHTML = "";

    const filtered = allItems.filter(item => currentFilter === "all" || item.category === currentFilter);

    document.getElementById("emptyMsg").style.display = filtered.length ? "none" : "block";

    filtered.forEach(item => {
      const a = document.createElement("a");
      a.className = "card";
      a.href = item.href;
      a.innerHTML = cardHtml(item);
      grid.appendChild(a);
    });
  }

  document.getElementById("tabs").addEventListener("click", (e) => {
    const btn = e.target.closest(".tab");
    if (!btn) return;
    currentFilter = btn.dataset.filter;
    document.querySelectorAll(".tab").forEach(t => t.classList.toggle("active", t === btn));
    renderGrid();
  });

  // 視聴時間が残っているコンテンツがあれば「戻る」バナーを出す（時間内の再入場）
  function renderResumeBanner() {
    const el = document.getElementById("resumeBanner");
    let sess = null;
    try { sess = JSON.parse(localStorage.getItem("viewAccess") || "null"); } catch (e) {}
    if (sess && sess.viewExpiresAt && sess.viewExpiresAt > Date.now()) {
      const min = Math.max(1, Math.round((sess.viewExpiresAt - Date.now()) / 60000));
      const title = esc((sess.title || "視聴中のコンテンツ").replace(/\n/g, " "));
      el.innerHTML = `<a href="view.html">▶ 「${title}」の続きを見る <span>（残り約${min}分・時間内なら何度でも再入場できます）</span></a>`;
      el.style.display = "block";
    } else {
      el.style.display = "none";
    }
  }

  // 名前ゲートを起動（未入力なら名前を聞く）
  initNameGate();
  renderResumeBanner();

  Promise.all([
    db.ref("contents").once("value"),
    db.ref("sets").once("value"),
  ]).then(([contentsSnap, setsSnap]) => {
    const contentsData = contentsSnap.val() || {};
    const setsData = setsSnap.val() || {};

    document.getElementById("loadingMsg").style.display = "none";

    // コンテンツは管理画面でドラッグ並び替えした順（order）を優先し、
    // 未設定の古いデータは登録順（createdAt）にフォールバックする
    const sortedContentEntries = Object.entries(contentsData).sort((a, b) => {
      const oa = a[1].order !== undefined ? a[1].order : (a[1].createdAt || 0);
      const ob = b[1].order !== undefined ? b[1].order : (b[1].createdAt || 0);
      return oa - ob;
    });

    allItems = [
      ...Object.entries(setsData).map(([id, s]) => ({
        category: "set", href: `login.html?set=${id}`, data: s, targetKey: `set:${id}`,
      })),
      ...sortedContentEntries.map(([id, c]) => ({
        category: c.type === "game" ? "game" : "video", href: `login.html?content=${id}`, data: c, targetKey: `content:${id}`,
      })),
    ];

    updateTabCounts();
    renderGrid();
  });
</script>
</body>
</html>
