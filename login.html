<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>研修コンテンツ｜コード入力</title>
<style>
  :root{
    --ink:#1c1f26; --paper:#f6f5f1; --line:#d8d5cc; --accent:#8a3324;
    --mono: "SFMono-Regular", Consolas, "Courier New", monospace;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
    font-family:"Hiragino Sans","Yu Gothic UI",sans-serif;background:var(--paper);color:var(--ink);padding:20px;
  }
  .card{width:100%;max-width:420px;background:#fff;border:1px solid var(--line);padding:28px;}
  .thumb{width:100%;aspect-ratio:16/9;background:#111;overflow:hidden;margin-bottom:18px;}
  .thumb img{width:100%;height:100%;object-fit:cover;display:block;}
  h1{font-size:16px;margin:0 0 4px;letter-spacing:.02em;white-space:pre-line;}
  p.sub{font-size:13px;color:#777;margin:0 0 22px;}
  input{
    width:100%;font-family:var(--mono);font-size:22px;letter-spacing:.18em;text-align:center;text-transform:uppercase;
    padding:14px 10px;border:1px solid var(--line);margin-bottom:14px;
  }
  input:focus{outline:2px solid var(--accent);outline-offset:1px;}
  button{width:100%;background:var(--ink);color:#fff;border:none;padding:13px;font-size:14px;cursor:pointer;}
  button:hover{background:var(--accent);}
  button:disabled{background:#aaa;cursor:not-allowed;}
  .msg{margin-top:14px;font-size:13px;padding:10px 12px;display:none;}
  .msg.show{display:block;}
  .msg.error{background:#f6e0dd;color:var(--accent);}
  a.back{display:inline-block;margin-top:16px;font-size:12px;color:#888;text-decoration:none;}
  a.back:hover{color:var(--accent);}
</style>
</head>
<body>
  <div class="card" id="card">
    <p class="sub">読み込み中...</p>
  </div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script>
  // admin.html / gallery.html / view.html と同じFirebase設定に置き換えてください
  const firebaseConfig = {
    apiKey: "AIzaSyCN4OEFU_GgqklqE9pKVgpqvLRQPnAcIsU",
    authDomain: "cardocgame.firebaseapp.com",
    databaseURL: "https://cardocgame-default-rtdb.firebaseio.com",
    projectId: "cardocgame",
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  const params = new URLSearchParams(location.search);
  const contentId = params.get("content");
  let contentData = null;

  async function init() {
    if (!contentId) {
      renderError("コンテンツが指定されていません。一覧ページからやり直してください。");
      return;
    }

    const snap = await db.ref("contents/" + contentId).once("value");
    contentData = snap.val();

    if (!contentData) {
      renderError("指定されたコンテンツが見つかりません。一覧ページからやり直してください。");
      return;
    }

    renderForm();
  }

  function renderError(text) {
    document.getElementById("card").innerHTML = `
      <p class="sub">${text}</p>
      <a class="back" href="gallery.html">← コンテンツ一覧へ戻る</a>
    `;
  }

  function renderForm() {
    document.getElementById("card").innerHTML = `
      <div class="thumb"><img src="${contentData.thumbnail || ''}" alt="${contentData.title}"></div>
      <h1>${contentData.title}</h1>
      <p class="sub">担当者から伝えられた専用コードを入力してください（1回のみ有効です）</p>
      <form id="loginForm">
        <input type="text" id="codeInput" maxlength="6" autocomplete="off" placeholder="A1B2C3" required>
        <button id="submitBtn" type="submit">${contentData.type === "game" ? "プレイする" : "視聴する"}</button>
      </form>
      <div class="msg error" id="errorMsg"></div>
      <a class="back" href="gallery.html">← コンテンツ一覧へ戻る</a>
    `;
    document.getElementById("loginForm").addEventListener("submit", submitCode);
  }

  async function submitCode(e) {
    e.preventDefault();
    const btn = document.getElementById("submitBtn");
    const raw = document.getElementById("codeInput").value.trim().toUpperCase();
    document.getElementById("errorMsg").classList.remove("show");
    if (!raw) return false;

    btn.disabled = true;
    btn.textContent = "確認中...";

    try {
      const ref = db.ref("otp_codes/" + raw);
      const snap = await ref.once("value");
      const entry = snap.val();

      if (!entry) {
        showError("コードが見つかりません。入力内容をご確認ください。");
        return false;
      }
      if (entry.contentId !== contentId) {
        showError("このコードは別のコンテンツ専用です。");
        return false;
      }
      if (entry.used) {
        showError("このコードは既に使用されています。新しいコードを担当者に発行してもらってください。");
        return false;
      }
      if (entry.expiresAt < Date.now()) {
        showError("このコードの有効期限が切れています。新しいコードを担当者に発行してもらってください。");
        return false;
      }

      await ref.update({ used: true, usedAt: Date.now() });

      const viewMinutes = entry.viewMinutes || 60;

      sessionStorage.setItem("viewAccess", JSON.stringify({
        contentId,
        type: contentData.type,
        title: contentData.title,
        videoId: contentData.videoId || null,
        gameUrl: contentData.gameUrl || null,
        videoUrl: contentData.videoUrl || null,
        grantedAt: Date.now(),
        viewExpiresAt: Date.now() + viewMinutes * 60 * 1000,
      }));

      location.href = "view.html";
    } catch (err) {
      showError("エラーが発生しました: " + err.message);
    } finally {
      btn.disabled = false;
      btn.textContent = contentData.type === "game" ? "プレイする" : "視聴する";
    }
    return false;
  }

  function showError(text) {
    const el = document.getElementById("errorMsg");
    el.textContent = text;
    el.classList.add("show");
  }

  init();
</script>
</body>
</html>
