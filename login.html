<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>研修コンテンツ｜コード入力</title>
<style>
  :root{
    --ink:#1c1f26; --paper:#f6f5f1; --line:#d8d5cc; --accent:#8a3324;
    --mono: "SFMono-Regular", Consolas, "Courier New", monospace;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
    font-family:"Hiragino Sans","Yu Gothic UI",sans-serif;background:var(--paper);color:var(--ink);padding:20px;
  }
  .card{width:100%;max-width:420px;background:#fff;border:1px solid var(--line);padding:28px;}
  .thumb{width:100%;aspect-ratio:16/9;background:#111;overflow:hidden;margin-bottom:18px;position:relative;}
  .thumb img{width:100%;height:100%;object-fit:cover;display:block;}
  .thumb .set-badge{
    position:absolute;top:8px;left:8px;background:rgba(0,0,0,0.65);color:#fff;
    font-size:11px;padding:2px 8px;border-radius:10px;
  }
  .collage{display:grid;width:100%;height:100%;gap:2px;background:#000;}
  .collage img{width:100%;height:100%;object-fit:cover;display:block;}
  .collage-1{grid-template-columns:1fr;grid-template-rows:1fr;}
  .collage-2{grid-template-columns:1fr 1fr;grid-template-rows:1fr;}
  .collage-3{grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;}
  .collage-3 img:first-child{grid-column:1 / 3;}
  .collage-4{grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;}
  h1{font-size:16px;margin:0 0 4px;letter-spacing:.02em;white-space:pre-line;}
  p.sub{font-size:13px;color:#777;margin:0 0 22px;}
  .set-members{margin:0 0 18px;padding:0;list-style:none;font-size:12px;color:#555;}
  .set-members li{padding:4px 0;border-bottom:1px solid var(--line);}
  input{
    width:100%;font-family:var(--mono);font-size:17px;letter-spacing:.06em;text-align:center;
    padding:14px 10px;border:1px solid var(--line);margin-bottom:14px;
  }
  input:focus{outline:2px solid var(--accent);outline-offset:1px;}
  button{width:100%;background:var(--ink);color:#fff;border:none;padding:13px;font-size:14px;cursor:pointer;}
  button:hover{background:var(--accent);}
  button:disabled{background:#aaa;cursor:not-allowed;}
  .msg{margin-top:14px;font-size:13px;padding:10px 12px;display:none;}
  .msg.show{display:block;}
  .msg.error{background:#f6e0dd;color:var(--accent);}
  a.back{display:inline-block;margin-top:16px;font-size:12px;color:#888;text-decoration:none;}
  a.back:hover{color:var(--accent);}
  .loading{color:#999;font-size:13px;display:flex;align-items:center;justify-content:center;gap:10px;padding:30px 0;}
  .spinner{
    width:18px;height:18px;border:2.5px solid var(--line);border-top-color:var(--accent);
    border-radius:50%;display:inline-block;animation:spin .8s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
  <div class="card" id="card">
    <div class="loading"><span class="spinner"></span>読み込み中...</div>
  </div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script>
  // admin.html / gallery.html / view.html と同じFirebase設定に置き換えてください
  const firebaseConfig = {
    apiKey: "AIzaSyCN4OEFU_GgqklqE9pKVgpqvLRQPnAcIsU",
    authDomain: "cardocgame.firebaseapp.com",
    databaseURL: "https://cardocgame-default-rtdb.firebaseio.com",
    projectId: "cardocgame",
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  // XSS対策：DBから来た文字列は必ずこの関数を通してからHTMLに埋め込む
  function esc(s) {
    return String(s ?? "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;");
  }

  // コード入力の正規化：全角英数記号→半角、空白（全角含む）を除去。
  // スマホやメールからのコピペで混入しがちな崩れを吸収し、入力ミスを減らす。
  function normalizeCode(s) {
    return String(s ?? "")
      .replace(/[！-～]/g, ch => String.fromCharCode(ch.charCodeAt(0) - 0xFEE0))
      .replace(/\s+/g, "");
  }

  const params = new URLSearchParams(location.search);
  const contentId = params.get("content");
  const setId = params.get("set");
  const isSet = !!setId;

  let targetData = null;   // コンテンツ or セットの情報
  let setMembers = null;   // セットの場合、含まれるコンテンツの詳細一覧

  async function init() {
    if (!contentId && !setId) {
      renderError("コンテンツが指定されていません。一覧ページからやり直してください。");
      return;
    }

    // すでに同じ対象への有効なアクセス権が残っている場合は、コード入力をスキップする
    const targetKey = isSet ? `set:${setId}` : `content:${contentId}`;
    try {
      const existingRaw = localStorage.getItem("viewAccess");
      if (existingRaw) {
        const existing = JSON.parse(existingRaw);
        if (existing.targetKey === targetKey && existing.viewExpiresAt > Date.now()) {
          location.replace("view.html");
          return;
        }
      }
    } catch (e) { /* 壊れたデータは無視して通常フローへ */ }

    if (isSet) {
      const snap = await db.ref("sets/" + setId).once("value");
      targetData = snap.val();
      if (!targetData) {
        renderError("指定されたセットが見つかりません。一覧ページからやり直してください。");
        return;
      }

      const memberSnaps = await Promise.all(
        (targetData.contentIds || []).map(cid => db.ref("contents/" + cid).once("value"))
      );
      setMembers = memberSnaps
        .map((s, i) => ({ id: targetData.contentIds[i], ...s.val() }))
        .filter(m => m && m.title);
    } else {
      const snap = await db.ref("contents/" + contentId).once("value");
      targetData = snap.val();
      if (!targetData) {
        renderError("指定されたコンテンツが見つかりません。一覧ページからやり直してください。");
        return;
      }
    }

    renderForm();
  }

  function renderError(text) {
    document.getElementById("card").innerHTML = `
      <p class="sub">${esc(text)}</p>
      <a class="back" href="gallery.html">← コンテンツ一覧へ戻る</a>
    `;
  }

  function collageHtml(thumbnails) {
    const imgs = (thumbnails || []).filter(Boolean).slice(0, 4);
    if (imgs.length === 0) {
      return `<img src="" onerror="this.style.opacity=0.15">`;
    }
    const cls = `collage-${imgs.length}`;
    return `<div class="collage ${cls}">${imgs.map(u => `<img src="${esc(u)}" onerror="this.style.opacity=0.15">`).join("")}</div>`;
  }

  function renderForm() {
    const membersHtml = isSet
      ? `<ul class="set-members">${setMembers.map(m => `<li>${(m.type === "game") ? "🎮" : "▶"} ${esc(m.title.replace(/\n/g, " "))}</li>`).join("")}</ul>`
      : "";

    const thumbHtml = isSet
      ? collageHtml((targetData.thumbnails && targetData.thumbnails.length) ? targetData.thumbnails : setMembers.map(m => m.thumbnail))
      : `<img src="${esc(targetData.thumbnail || '')}" alt="${esc(targetData.title)}">`;

    document.getElementById("card").innerHTML = `
      <div class="thumb">
        ${isSet ? `<span class="set-badge">セット（${setMembers.length}件）</span>` : ""}
        ${thumbHtml}
      </div>
      <h1>${esc(targetData.title)}</h1>
      ${membersHtml}
      <p class="sub">担当者から伝えられた専用コードを入力してください（1回のみ有効です）</p>
      <form id="loginForm">
        <input type="text" id="codeInput" maxlength="20" autocomplete="off"
               autocapitalize="off" autocorrect="off" spellcheck="false"
               inputmode="text" placeholder="Ab3!Xy9@Qz1_" required>
        <button id="submitBtn" type="submit">${isSet ? "見る" : (targetData.type === "game" ? "プレイする" : "視聴する")}</button>
      </form>
      <div class="msg error" id="errorMsg"></div>
      <a class="back" href="gallery.html">← コンテンツ一覧へ戻る</a>
    `;
    document.getElementById("loginForm").addEventListener("submit", submitCode);

    const input = document.getElementById("codeInput");
    // 貼り付け・入力のたびに正規化（カーソル位置は末尾でよい短い入力なので気にしない）
    input.addEventListener("input", () => {
      const normalized = normalizeCode(input.value);
      if (normalized !== input.value) input.value = normalized;
    });
    // 開いてすぐ入力できるようにフォーカス
    input.focus();
  }

  function toItem(c) {
    return {
      title: c.title || "",
      type: c.type,
      videoId: c.videoId || null,
      gameUrl: c.gameUrl || null,
      videoUrl: c.videoUrl || null,
      thumbnail: c.thumbnail || "",
    };
  }

  async function submitCode(e) {
    e.preventDefault();
    const btn = document.getElementById("submitBtn");
    const raw = normalizeCode(document.getElementById("codeInput").value);
    document.getElementById("errorMsg").classList.remove("show");
    if (!raw) return false;

    btn.disabled = true;
    btn.textContent = "確認中...";

    try {
      const ref = db.ref("otp_codes/" + raw);
      const snap = await ref.once("value");
      const entry = snap.val();

      if (!entry) {
        showError("コードが見つかりません。入力内容をご確認ください。");
        return false;
      }

      const targetMatches = isSet ? entry.setId === setId : entry.contentId === contentId;
      if (!targetMatches) {
        showError("このコードは別のコンテンツ・セット専用です。", true);
        return false;
      }
      if (entry.used) {
        showError("このコードは既に使用されています。新しいコードを担当者に発行してもらってください。", true);
        return false;
      }
      if (entry.expiresAt < Date.now()) {
        showError("このコードの有効期限が切れています。新しいコードを担当者に発行してもらってください。", true);
        return false;
      }

      // used:false → true をアトミックに確定させる。
      // これにより「2人が同時に同じコードを入れて両方通ってしまう」二重使用を防ぐ。
      // 注意：transactionは初回実行時、データが実在してもローカルキャッシュが
      // 空だと null を渡してくる。その場合に undefined を返す（=中断）と
      // サーバー値での再実行が行われないまま失敗するので、null のときは
      // null を返して「サーバー実データでの再実行」を促すのが正しい書き方。
      const tx = await ref.transaction((cur) => {
        if (cur === null) return null;   // キャッシュ未取得 → 実データで再実行される
        if (cur.used) return;            // 本当に使用済み → 中断（committed=false）
        cur.used = true;
        cur.usedAt = Date.now();
        return cur;
      });
      if (!tx.committed) {
        showError("このコードは既に使用されています。新しいコードを担当者に発行してもらってください。", true);
        return false;
      }
      if (!tx.snapshot.exists()) {
        // 照合直後に管理側で削除された等のまれなケース
        showError("コードが見つかりません。担当者に確認してください。", true);
        return false;
      }

      const viewMinutes = entry.viewMinutes || 60;
      const items = isSet ? setMembers.map(toItem) : [toItem(targetData)];

      const targetKey = isSet ? `set:${setId}` : `content:${contentId}`;

      localStorage.setItem("viewAccess", JSON.stringify({
        targetKey,
        title: targetData.title,
        items,
        currentIndex: 0,
        viewExpiresAt: Date.now() + viewMinutes * 60 * 1000,
      }));

      // 一覧ページで「✓ 視聴済み」を出すための記録（この端末のみ・重複なし）
      try {
        const viewed = JSON.parse(localStorage.getItem("viewedTargets") || "[]");
        if (!viewed.includes(targetKey)) {
          viewed.push(targetKey);
          localStorage.setItem("viewedTargets", JSON.stringify(viewed));
        }
      } catch (e) { /* 記録に失敗しても視聴は続行 */ }

      // location.replace を使い、ログイン画面を履歴に残さない。
      // これにより「戻る」を押した時にログイン画面（使用済みコード入りの状態）に
      // 戻ってしまい、誤って再送信されるのを防ぐ。
      location.replace("view.html");
    } catch (err) {
      showError("エラーが発生しました: " + err.message);
    } finally {
      btn.disabled = false;
      btn.textContent = isSet ? "見る" : (targetData.type === "game" ? "プレイする" : "視聴する");
    }
    return false;
  }

  // terminal=true のときは「これ以上ここで操作しても無駄」な状況なので、
  // 一覧へ戻るボタンを併せて出して次の行動を明確にする。
  function showError(text, terminal) {
    const el = document.getElementById("errorMsg");
    if (terminal) {
      el.innerHTML = `<div>${esc(text)}</div>
        <a class="back" href="gallery.html" style="margin-top:10px;">← コンテンツ一覧へ戻る</a>`;
    } else {
      el.textContent = text;
    }
    el.classList.add("show");
  }

  init();
</script>
</body>
</html>
