<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>研修コンテンツ｜コード入力</title>
<style>
  :root{
    --ink:#1c1f26; --paper:#f6f5f1; --line:#d8d5cc; --accent:#8a3324;
    --mono: "SFMono-Regular", Consolas, "Courier New", monospace;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
    font-family:"Hiragino Sans","Yu Gothic UI",sans-serif;background:var(--paper);color:var(--ink);padding:20px;
  }
  .card{width:100%;max-width:420px;background:#fff;border:1px solid var(--line);padding:28px;}
  .thumb{width:100%;aspect-ratio:16/9;background:#111;overflow:hidden;margin-bottom:18px;position:relative;}
  .thumb img{width:100%;height:100%;object-fit:cover;display:block;}
  .thumb .set-badge{
    position:absolute;top:8px;left:8px;background:rgba(0,0,0,0.65);color:#fff;
    font-size:11px;padding:2px 8px;border-radius:10px;
  }
  .collage{display:grid;width:100%;height:100%;gap:2px;background:#000;}
  .collage img{width:100%;height:100%;object-fit:cover;display:block;}
  .collage-1{grid-template-columns:1fr;grid-template-rows:1fr;}
  .collage-2{grid-template-columns:1fr 1fr;grid-template-rows:1fr;}
  .collage-3{grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;}
  .collage-3 img:first-child{grid-column:1 / 3;}
  .collage-4{grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;}
  h1{font-size:16px;margin:0 0 4px;letter-spacing:.02em;white-space:pre-line;}
  p.sub{font-size:13px;color:#777;margin:0 0 22px;}
  .set-members{margin:0 0 18px;padding:0;list-style:none;font-size:12px;color:#555;}
  .set-members li{padding:4px 0;border-bottom:1px solid var(--line);}
  input{
    width:100%;font-family:var(--mono);font-size:17px;letter-spacing:.06em;text-align:center;
    padding:14px 10px;border:1px solid var(--line);margin-bottom:14px;
  }
  input:focus{outline:2px solid var(--accent);outline-offset:1px;}
  button{width:100%;background:var(--ink);color:#fff;border:none;padding:13px;font-size:14px;cursor:pointer;}
  button:hover{background:var(--accent);}
  button:disabled{background:#aaa;cursor:not-allowed;}
  .msg{margin-top:14px;font-size:13px;padding:10px 12px;display:none;}
  .msg.show{display:block;}
  .msg.error{background:#f6e0dd;color:var(--accent);}
  a.back{display:inline-block;margin-top:16px;font-size:12px;color:#888;text-decoration:none;}
  a.back:hover{color:var(--accent);}
</style>
</head>
<body>
  <div class="card" id="card">
    <p class="sub">読み込み中...</p>
  </div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script>
  // admin.html / gallery.html / view.html と同じFirebase設定に置き換えてください
  const firebaseConfig = {
    apiKey: "AIzaSyCN4OEFU_GgqklqE9pKVgpqvLRQPnAcIsU",
    authDomain: "cardocgame.firebaseapp.com",
    databaseURL: "https://cardocgame-default-rtdb.firebaseio.com",
    projectId: "cardocgame",
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  const params = new URLSearchParams(location.search);
  const contentId = params.get("content");
  const setId = params.get("set");
  const isSet = !!setId;

  let targetData = null;   // コンテンツ or セットの情報
  let setMembers = null;   // セットの場合、含まれるコンテンツの詳細一覧

  async function init() {
    if (!contentId && !setId) {
      renderError("コンテンツが指定されていません。一覧ページからやり直してください。");
      return;
    }

    if (isSet) {
      const snap = await db.ref("sets/" + setId).once("value");
      targetData = snap.val();
      if (!targetData) {
        renderError("指定されたセットが見つかりません。一覧ページからやり直してください。");
        return;
      }

      const memberSnaps = await Promise.all(
        (targetData.contentIds || []).map(cid => db.ref("contents/" + cid).once("value"))
      );
      setMembers = memberSnaps
        .map((s, i) => ({ id: targetData.contentIds[i], ...s.val() }))
        .filter(m => m && m.title);
    } else {
      const snap = await db.ref("contents/" + contentId).once("value");
      targetData = snap.val();
      if (!targetData) {
        renderError("指定されたコンテンツが見つかりません。一覧ページからやり直してください。");
        return;
      }
    }

    renderForm();
  }

  function renderError(text) {
    document.getElementById("card").innerHTML = `
      <p class="sub">${text}</p>
      <a class="back" href="gallery.html">← コンテンツ一覧へ戻る</a>
    `;
  }

  function collageHtml(thumbnails) {
    const imgs = (thumbnails || []).filter(Boolean).slice(0, 4);
    if (imgs.length === 0) {
      return `<img src="" onerror="this.style.opacity=0.15">`;
    }
    const cls = `collage-${imgs.length}`;
    return `<div class="collage ${cls}">${imgs.map(u => `<img src="${u}" onerror="this.style.opacity=0.15">`).join("")}</div>`;
  }

  function renderForm() {
    const membersHtml = isSet
      ? `<ul class="set-members">${setMembers.map(m => `<li>${(m.type === "game") ? "🎮" : "▶"} ${m.title.replace(/\n/g, " ")}</li>`).join("")}</ul>`
      : "";

    const thumbHtml = isSet
      ? collageHtml((targetData.thumbnails && targetData.thumbnails.length) ? targetData.thumbnails : setMembers.map(m => m.thumbnail))
      : `<img src="${targetData.thumbnail || ''}" alt="${targetData.title}">`;

    document.getElementById("card").innerHTML = `
      <div class="thumb">
        ${isSet ? `<span class="set-badge">セット（${setMembers.length}件）</span>` : ""}
        ${thumbHtml}
      </div>
      <h1>${targetData.title}</h1>
      ${membersHtml}
      <p class="sub">担当者から伝えられた専用コードを入力してください（1回のみ有効です）</p>
      <form id="loginForm">
        <input type="text" id="codeInput" maxlength="20" autocomplete="off" placeholder="Ab3!Xy9@Qz1_" required>
        <button id="submitBtn" type="submit">${isSet ? "見る" : (targetData.type === "game" ? "プレイする" : "視聴する")}</button>
      </form>
      <div class="msg error" id="errorMsg"></div>
      <a class="back" href="gallery.html">← コンテンツ一覧へ戻る</a>
    `;
    document.getElementById("loginForm").addEventListener("submit", submitCode);
  }

  function toItem(c) {
    return {
      title: c.title || "",
      type: c.type,
      videoId: c.videoId || null,
      gameUrl: c.gameUrl || null,
      videoUrl: c.videoUrl || null,
      thumbnail: c.thumbnail || "",
    };
  }

  async function submitCode(e) {
    e.preventDefault();
    const btn = document.getElementById("submitBtn");
    const raw = document.getElementById("codeInput").value.trim();
    document.getElementById("errorMsg").classList.remove("show");
    if (!raw) return false;

    btn.disabled = true;
    btn.textContent = "確認中...";

    try {
      const ref = db.ref("otp_codes/" + raw);
      const snap = await ref.once("value");
      const entry = snap.val();

      if (!entry) {
        showError("コードが見つかりません。入力内容をご確認ください。");
        return false;
      }

      const targetMatches = isSet ? entry.setId === setId : entry.contentId === contentId;
      if (!targetMatches) {
        showError("このコードは別のコンテンツ・セット専用です。");
        return false;
      }
      if (entry.used) {
        showError("このコードは既に使用されています。新しいコードを担当者に発行してもらってください。");
        return false;
      }
      if (entry.expiresAt < Date.now()) {
        showError("このコードの有効期限が切れています。新しいコードを担当者に発行してもらってください。");
        return false;
      }

      await ref.update({ used: true, usedAt: Date.now() });

      const viewMinutes = entry.viewMinutes || 60;
      const items = isSet ? setMembers.map(toItem) : [toItem(targetData)];

      localStorage.setItem("viewAccess", JSON.stringify({
        title: targetData.title,
        items,
        currentIndex: 0,
        viewExpiresAt: Date.now() + viewMinutes * 60 * 1000,
      }));

      location.href = "view.html";
    } catch (err) {
      showError("エラーが発生しました: " + err.message);
    } finally {
      btn.disabled = false;
      btn.textContent = isSet ? "見る" : (targetData.type === "game" ? "プレイする" : "視聴する");
    }
    return false;
  }

  function showError(text) {
    const el = document.getElementById("errorMsg");
    el.textContent = text;
    el.classList.add("show");
  }

  init();
</script>
</body>
</html>
